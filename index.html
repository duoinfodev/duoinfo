<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DUOINFO — Site en construction</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      z-index: 0;
    }

    body::before {
      background: #3b82f6;
      top: -150px;
      left: -150px;
    }

    body::after {
      background: #06b6d4;
      bottom: -150px;
      right: -150px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 650px;
      padding: 50px 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .logo {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 12px;
    }

    .logo span {
      color: #38bdf8;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 18px;
      font-weight: 600;
    }

    p {
      color: #cbd5e1;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(56, 189, 248, 0.12);
      color: #7dd3fc;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #38bdf8;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.5);
        opacity: 0.5;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    footer {
      margin-top: 35px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    @media (max-width: 640px) {
      .container {
        padding: 40px 25px;
      }

      .logo {
        font-size: 2.8rem;
      }

      h1 {
        font-size: 1.6rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Duo<span>Info</span></div>

    <h1>Notre site arrive bientôt</h1>

    <p>
      Nous préparons actuellement quelque chose de moderne, rapide et efficace.
      Revenez nous voir bientôt pour découvrir les services de DuoInfo.
    </p>

    <div class="status">
      <div class="dot"></div>
      Site en construction
    </div>

    <footer>
      © 2026 DuoInfo — Québec, Canada
    </footer>
  </div>

</body>
</html>
