<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>duoinfo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top right, rgba(34,197,94,0.10), transparent 30%),
        #f7f8f5;
      color:#111827;
      overflow:hidden;
      position:relative;
    }

    /* subtle grid */
    body::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size:28px 28px;
      opacity:0.35;
      pointer-events:none;
    }

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:720px;
      padding:60px 40px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 18px;
      border-radius:999px;
      background:#dff7ea;
      border:1px solid #b7ebcb;
      color:#18a058;
      font-size:0.9rem;
      font-weight:600;
      margin-bottom:32px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#22c55e;
      animation:pulse 1.8s infinite;
    }

    h1{
      font-size:clamp(3rem, 8vw, 5.5rem);
      line-height:0.95;
      letter-spacing:-3px;
      font-weight:800;
      margin-bottom:24px;
      color:#0b1220;
    }

    h1 span{
      color:#1dbf73;
    }

    p{
      font-size:1.15rem;
      line-height:1.8;
      color:#6b7280;
      max-width:540px;
      margin-bottom:40px;
    }

    .buttons{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    .btn-primary{
      background:#19b36b;
      color:white;
      text-decoration:none;
      padding:18px 34px;
      border-radius:999px;
      font-weight:600;
      transition:0.25s ease;
      box-shadow:0 10px 30px rgba(25,179,107,0.25);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      background:#16a363;
    }

    .btn-secondary{
      background:white;
      color:#111827;
      text-decoration:none;
      padding:18px 34px;
      border-radius:999px;
      font-weight:500;
      border:1px solid #e5e7eb;
      transition:0.25s ease;
    }

    .btn-secondary:hover{
      background:#f3f4f6;
    }

    footer{
      margin-top:60px;
      color:#9ca3af;
      font-size:0.9rem;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
        opacity:1;
      }
      50%{
        transform:scale(1.4);
        opacity:0.5;
      }
      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    @media(max-width:640px){

      .container{
        padding:40px 24px;
      }

      h1{
        letter-spacing:-2px;
      }

      p{
        font-size:1rem;
      }

      .buttons{
        flex-direction:column;
        width:100%;
      }

      .btn-primary,
      .btn-secondary{
        text-align:center;
        width:100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="badge">
      <div class="dot"></div>
      DUOINFO · QUÉBEC
    </div>

    <h1>
      Notre site<br>
      arrive <span>bientôt.</span>
    </h1>

    <p>
      duoinfo prépare actuellement une nouvelle plateforme moderne,
      rapide et simple pour accompagner les PME et travailleurs autonomes du Québec avec leurs besoins informatiques.
    </p>

    <footer>
      © 2026 duoinfo — Support informatique Québec
    </footer>

  </div>

</body>
</html>
